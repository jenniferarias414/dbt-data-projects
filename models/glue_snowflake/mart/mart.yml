version: 2

models:
  - name: country_details_africa
    description: "Mart table containing country details for Africa."
    columns:
      - name: country_continent_name
        description: "Continent name for the country."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Africa']

